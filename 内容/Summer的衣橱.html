<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer 的搭配灵感库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F5F0;--surface:#FFFFFF;--border:#E8E4DC;--border-dark:#C8C2B4;--text-primary:#1A1814;--text-secondary:#6B6560;--text-hint:#A09A92;--accent:#2D5A3D;--accent-light:#EAF2EC;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:baseline;gap:1rem;}
  header h1{font-family:'Noto Serif SC',serif;font-size:1.25rem;font-weight:600;}
  header .date{font-size:.78rem;color:var(--text-hint);}
  .main{max-width:860px;margin:0 auto;padding:1.75rem 1.5rem 3rem;}
  .sh{font-family:'Noto Serif SC',serif;font-size:.85rem;font-weight:600;color:var(--text-secondary);letter-spacing:.05em;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
  .sh::after{content:'';flex:1;height:1px;background:var(--border);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow);}
  .fl{font-size:.68rem;font-weight:500;color:var(--text-hint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.7rem;}
  .tr{display:flex;flex-wrap:wrap;gap:8px;}
  .tag{padding:6px 15px;border-radius:99px;font-size:.8rem;cursor:pointer;border:1px solid var(--border-dark);background:var(--surface);color:var(--text-secondary);transition:all .15s;user-select:none;font-family:inherit;}
  .tag:hover{background:var(--bg);}
  .tag.weather.active{background:#1A3A5C;color:#fff;border-color:#1A3A5C;}
  .tag.scene.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .divider{height:1px;background:var(--border);margin:1.5rem 0;}
  .rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
  .rl{font-size:.68rem;font-weight:500;color:var(--text-hint);letter-spacing:.1em;text-transform:uppercase;}
  .rb{font-size:.72rem;color:var(--text-hint);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;}
  .empty{text-align:center;padding:2.5rem 0;color:var(--text-hint);font-size:.85rem;line-height:2;}
  .oc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1rem;box-shadow:var(--shadow);}
  .oh{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .ot{font-family:'Noto Serif SC',serif;font-size:.95rem;font-weight:600;color:var(--text-primary);}
  .sb{font-size:.66rem;padding:3px 10px;border-radius:99px;border:1px solid;white-space:nowrap;}
  .s-fairy{background:#FDF0F5;color:#9C2753;border-color:#F0AECB;}
  .s-retro{background:#F5F0E8;color:#7A5C2E;border-color:#C8A87A;}
  .s-fresh{background:#EDF7ED;color:#1E6B2E;border-color:#8DC98D;}
  .s-casual{background:#F0F0F7;color:#3D3D7A;border-color:#9A9AC8;}
  .s-college{background:#F0F5FF;color:#1A3A7A;border-color:#7A9ADF;}
  .s-sporty{background:#F0F7F5;color:#1A5A4A;border-color:#7AC8B8;}
  .oi{display:flex;flex-wrap:wrap;gap:12px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:5px;width:95px;}
  .iw{width:85px;height:85px;border-radius:10px;border:1px solid var(--border);background:#fafafa;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .iw img{width:100%;height:100%;object-fit:cover;}
  .ph{font-size:.6rem;color:var(--text-hint);text-align:center;padding:4px;line-height:1.4;}
  .ir{font-size:.6rem;color:var(--text-hint);}
  .in{font-size:.68rem;color:var(--text-secondary);text-align:center;line-height:1.4;}
  .tip{font-size:.75rem;color:var(--text-secondary);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6;}
  .ms{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-top:2rem;box-shadow:var(--shadow);}
  .mt{font-size:.85rem;color:var(--text-secondary);cursor:pointer;background:none;border:none;font-family:inherit;display:flex;align-items:center;gap:6px;width:100%;}
  .mb{display:none;margin-top:1.25rem;}
  .mb.open{display:block;}
  .mc{font-size:.7rem;font-weight:600;color:var(--text-hint);letter-spacing:.06em;text-transform:uppercase;margin-top:1rem;margin-bottom:.5rem;padding-bottom:4px;border-bottom:1px solid var(--border);}
  .mc:first-child{margin-top:0;}
  .mi{display:flex;align-items:center;padding:7px 0;gap:10px;border-bottom:1px solid var(--border);}
  .mi:last-child{border-bottom:none;}
  .mig{width:38px;height:38px;border-radius:6px;border:1px solid var(--border);background:#fafafa;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .mig img{width:100%;height:100%;object-fit:cover;}
  .mn{flex:1;font-size:.82rem;color:var(--text-primary);}
  .mn.del{text-decoration:line-through;color:var(--text-hint);}
  .db,.rb2{background:none;border:none;cursor:pointer;font-family:inherit;font-size:.72rem;padding:3px 10px;border-radius:6px;flex-shrink:0;}
  .db{color:var(--text-hint);}
  .db:hover{background:#FEE;color:#c0392b;}
  .rb2{color:var(--accent);}
  .rb2:hover{background:var(--accent-light);}
  footer{text-align:center;padding:2rem;font-size:.7rem;color:var(--text-hint);}
  .tag.mood.active{background:#7A4A8C;color:#fff;border-color:#7A4A8C;}
  .gen-btn{margin-top:.9rem;width:100%;padding:.7rem;border:1px dashed var(--border-dark);background:var(--bg);border-radius:10px;font-family:inherit;font-size:.85rem;color:var(--text-secondary);cursor:pointer;transition:all .15s;letter-spacing:.05em;}
  .gen-btn:hover{background:#fff;color:var(--text-primary);border-color:var(--accent);}
  .gen-btn.spin{opacity:.6;}
  .oc.gen{border-style:dashed;background:linear-gradient(180deg,#FFFEFB 0%,var(--surface) 100%);}
  .oc.gen .ot::before{content:"🎲 ";}
  .oc.fav .ot::before{content:"❤ ";color:#C04050;}
  .ob{display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
  .ob button{flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border-dark);background:var(--surface);font-family:inherit;font-size:.72rem;color:var(--text-secondary);cursor:pointer;transition:all .15s;}
  .ob button:hover{background:var(--bg);color:var(--text-primary);}
  .ob .heart{color:#C04050;border-color:#E8B0B8;}
  .ob .heart:hover{background:#FDF0F2;}
  .ob .heart.saved{background:#FDF0F2;color:#9A2030;}
  .anchor-select{width:100%;padding:.6rem .8rem;border:1px solid var(--border-dark);border-radius:8px;background:var(--surface);font-family:inherit;font-size:.85rem;color:var(--text-primary);margin-bottom:.5rem;cursor:pointer;}
  .anchor-info{font-size:.75rem;color:var(--accent);margin-bottom:.3rem;display:none;padding:.4rem .6rem;background:var(--accent-light);border-radius:6px;}
  .anchor-info.show{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .anchor-info button{background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:.8rem;padding:0 4px;font-family:inherit;}
  .anchor-info button:hover{color:#c0392b;}
  .item.anchor .iw{border:2px solid var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
  .item.anchor::after{content:"必穿";font-size:.55rem;color:var(--accent);font-weight:600;}
</style>
</head>
<body>
<header>
  <h1>Summer 的搭配灵感库</h1>
  <span class="date" id="dl"></span>
</header>
<div class="main">
  <div class="sh">今天穿什么</div>
  <div class="card">
    <div class="fl">今天的天气</div>
    <div class="tr">
      <span class="tag weather" data-val="hot">热（30°C+）</span>
      <span class="tag weather" data-val="warm">暖（25–30°C）</span>
      <span class="tag weather" data-val="mild">珀斯秋天（10–23°C）</span>
      <span class="tag weather" data-val="cool">凉（20°C以下）</span>
    </div>
  </div>
  <div class="card">
    <div class="fl">今天的场合</div>
    <div class="tr">
      <span class="tag scene" data-val="home">在家</span>
      <span class="tag scene" data-val="out">见人</span>
      <span class="tag scene" data-val="outdoor">户外</span>
    </div>
  </div>
  <div class="divider"></div>
  <div class="rh">
    <div class="rl">今日搭配</div>
    <button class="rb" onclick="resetAll()">清除筛选</button>
  </div>
  <div id="res"><div class="empty">选择天气和场合<br>看看今天穿什么</div></div>
  <div class="card">
    <div class="fl">心情偏好（不选 = 随机风格）</div>
    <div class="tr" id="moodChips"></div>
    <div class="fl" style="margin-top:1rem">必穿单品（可选）</div>
    <select id="anchorSelect" class="anchor-select" onchange="setAnchor(this.value)"></select>
    <div id="anchorInfo" class="anchor-info"></div>
    <button class="gen-btn" id="genBtn" onclick="generateAndShow()">🎲 抽一套搭配</button>
    <div id="genResult"></div>
  </div>
  <div class="ms" id="favPanel" style="display:none">
    <button class="mt" onclick="toggleFavPanel()"><span id="fa">▸</span> <span id="favTitle">全部收藏</span></button>
    <div class="mb" id="fb"></div>
  </div>
  <div class="ms">
    <button class="mt" onclick="toggleMgmt()"><span id="ma">▸</span> 管理衣橱</button>
    <div class="mb" id="mb"></div>
  </div>
</div>
<footer>Summer 的搭配灵感库 · 2026</footer>

function role(cat){
  if(cat.includes("背心")||cat.includes("打底")||cat.includes("上衣")||cat.includes("T恤")||cat.includes("衬衫")||cat.includes("毛衣")||cat.includes("卫衣"))return"上身";
  if(cat.includes("下装"))return"下身";
  if(cat.includes("连衣裙"))return"裙";
  if(cat.includes("外套")||cat.includes("夹克")||cat.includes("开衫")||cat.includes("马甲"))return"外搭";
  if(cat.includes("鞋"))return"鞋";
  if(cat.includes("围巾"))return"配件";
  return"";
}

function favMatchesCurrent(f){
  if(!f.items.every(id=>!isDel(id)&&gi(id)))return false;
  if(f.weather&&f.scene)return f.weather===state.weather&&f.scene===state.scene;
  const items=f.items.map(gi);

}

function pickCompat(pool,picked){
  if(!pool.length)return null;
  if(!picked.length)return pool[Math.floor(Math.random()*pool.length)];
  const scored=pool.map(item=>{
    let s=0;
    picked.forEach(p=>p.styles.forEach(st=>{if(item.styles.includes(st))s+=2;}));
    return{item,s:s+Math.random()};
  });
  scored.sort((a,b)=>b.s-a.s);
  const top=scored.slice(0,Math.max(1,Math.ceil(scored.length*0.4)));
  return top[Math.floor(Math.random()*top.length)].item;
}

const ROLE_ORDER={"裙":0,"上身":1,"下身":2,"外搭":3,"鞋":4,"配件":5};

function generateOutfit(){
  const w=state.weather,sc=state.scene,m=state.mood;
  if(!w||!sc)return null;
  const anchor=state.anchor?gi(state.anchor):null;
  const aRole=anchor?role(anchor.cat):null;
  const aIsDress=anchor&&anchor.cat.includes("连衣裙");
  const fits=it=>!isDel(it.id)&&it.id!==(anchor&&anchor.id)&&itemMatchesWeather(it,w)&&(m==="any"||it.styles.includes(m));
  const picked=[];
  if(anchor)picked.push(anchor);
  let needTopBottom=true;
  if(aIsDress)needTopBottom=false;
  if(aRole==="上身"){
    const bottoms=W.filter(it=>fits(it)&&role(it.cat)==="下身");
    if(!bottoms.length)return null;
    picked.push(pickCompat(bottoms,picked));
    needTopBottom=false;
  }else if(aRole==="下身"){
    const tops=W.filter(it=>fits(it)&&role(it.cat)==="上身");
    if(!tops.length)return null;
    picked.push(pickCompat(tops,picked));
    needTopBottom=false;
  }
  if(needTopBottom){
    const dresses=W.filter(it=>fits(it)&&it.cat.includes("连衣裙"));
    const tops=W.filter(it=>fits(it)&&role(it.cat)==="上身");
    const bottoms=W.filter(it=>fits(it)&&role(it.cat)==="下身");
    const useDress=dresses.length>0&&(tops.length===0||bottoms.length===0||Math.random()<0.35);
    if(useDress){
      picked.push(pickCompat(dresses,picked));
    }else{
      if(!tops.length||!bottoms.length)return null;
      picked.push(pickCompat(tops,picked));
      picked.push(pickCompat(bottoms,picked));
    }
  }
  const wantOuter=w==="cool"||(w==="mild"&&Math.random()<0.65)||(w==="hot"&&sc==="outdoor");
  if(aRole!=="外搭"&&wantOuter){
    const outers=W.filter(it=>fits(it)&&role(it.cat)==="外搭");
    if(outers.length)picked.push(pickCompat(outers,picked));
  }
  if(aRole!=="鞋"){
    let shoes=W.filter(it=>!isDel(it.id)&&role(it.cat)==="鞋"&&itemMatchesWeather(it,w));
    const moodShoes=m!=="any"?shoes.filter(it=>it.styles.includes(m)):shoes;
    if(moodShoes.length)shoes=moodShoes;
    if(shoes.length)picked.push(pickCompat(shoes,picked));
  }
  if(aRole!=="配件"&&w==="cool"&&sc==="outdoor"&&Math.random()<0.6){
    const scarves=W.filter(it=>!isDel(it.id)&&role(it.cat)==="配件");
    if(scarves.length)picked.push(pickCompat(scarves,picked));
  }
  const clean=picked.filter(Boolean);
  clean.sort((a,b)=>(ROLE_ORDER[role(a.cat)]??99)-(ROLE_ORDER[role(b.cat)]??99));
  return clean;
}

function dominantStyle(items){
  const cnt={};
  items.forEach(it=>it.styles.forEach(s=>cnt[s]=(cnt[s]||0)+1));
  const arr=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  return arr[0]?arr[0][0]:null;
}

function outfitCard(items,opts){
  opts=opts||{};
  const ds=dominantStyle(items);
  const styleCn=opts.style||(ds?STYLE_CN[ds]:"随性搭配");
  const titleCn=opts.title||styleCn;
  const cls=opts.cls||"";
  const isFav=opts.isFav||false;
  const anchorId=opts.anchorId||null;
  const ids=items.map(i=>i.id);
  const favIdx=state.favorites.findIndex(f=>f.items.length===ids.length&&f.items.every((x,i)=>x===ids[i]));
  const isSaved=favIdx>=0;
  const heartLabel=isSaved?"已收藏":"❤ 收藏";
  const heartCls=isSaved?"heart saved":"heart";
  const buttons=opts.showButtons?`<div class="ob">
    ${isFav?`<button onclick="removeFav(${opts.favIdx})">移除</button>`:`<button class="${heartCls}" onclick="toggleFav(this,'${ids.join(",")}','${styleCn}')">${heartLabel}</button>`}
    ${!isFav?`<button onclick="generateAndShow()">🎲 再来一套</button>`:""}
  </div>`:"";
  return`<div class="oc ${cls}">
    <div class="oh">
      <div class="ot">${titleCn}</div>
      <span class="sb ${SC[styleCn]||'s-casual'}">${styleCn}</span>
    </div>
    <div class="oi">
      ${items.map(item=>`<div class="item${anchorId&&item.id===anchorId?' anchor':''}">${imgEl(item)}<span class="ir">${role(item.cat)}</span><span class="in">${item.name}</span></div>`).join("")}
    </div>
    ${buttons}
  </div>`;
}

function renderAnchor(){
  const sel=document.getElementById("anchorSelect");
  const cats=[...new Set(W.map(w=>w.cat))];
  const groups=cats.map(cat=>{
    const items=W.filter(w=>w.cat===cat&&!isDel(w.id));
    if(!items.length)return"";
    return`<optgroup label="${cat}">`+items.map(w=>`<option value="${w.id}">${w.name}</option>`).join("")+`</optgroup>`;
  }).filter(Boolean).join("");
  sel.innerHTML=`<option value="">不指定</option>`+groups;
  sel.value=state.anchor||"";
  const info=document.getElementById("anchorInfo");
  if(state.anchor){
    const item=gi(state.anchor);
    info.innerHTML=`<span>📍 必穿：${item?item.name:''}</span><button onclick="setAnchor('')">✕ 清除</button>`;
    info.classList.add("show");
  }else{
    info.classList.remove("show");
    info.innerHTML="";
  }
}

function setAnchor(id){
  state.anchor=id||null;
  renderAnchor();
}

function generateAndShow(){
  if(!state.weather||!state.scene){
    document.getElementById("genResult").innerHTML='<div class="empty" style="padding:1rem 0">先在上面选择天气和场合</div>';
    return;
  }
  const btn=document.getElementById("genBtn");
  btn.classList.add("spin");
  setTimeout(()=>btn.classList.remove("spin"),200);
  let items=null;
  for(let i=0;i<5&&!items;i++)items=generateOutfit();
  const area=document.getElementById("genResult");
  if(!items||!items.length){
    area.innerHTML='<div class="empty" style="padding:1rem 0">没有匹配的衣服了，换个心情或场合试试</div>';
    return;
  }
  state.lastGen=items.map(i=>i.id);
  area.innerHTML=outfitCard(items,{cls:"gen",showButtons:true,anchorId:state.anchor});
}

function toggleFav(btn,idsStr,styleCn){
  const ids=idsStr.split(",");
  const idx=state.favorites.findIndex(f=>f.items.length===ids.length&&f.items.every((x,i)=>x===ids[i]));
  if(idx>=0){
    state.favorites.splice(idx,1);
  }else{
    state.favorites.unshift({items:ids,style:styleCn,weather:state.weather,scene:state.scene,ts:Date.now()});
  }
  saveState();
  render();
  renderFavs();
  if(state.lastGen){
    const items=state.lastGen.map(gi).filter(Boolean);
    document.getElementById("genResult").innerHTML=outfitCard(items,{cls:"gen",showButtons:true,anchorId:state.anchor});
  }
}

function removeFav(idx){
  state.favorites.splice(idx,1);
  saveState();
  render();
  renderFavs();
  if(state.lastGen){
    const items=state.lastGen.map(gi).filter(Boolean);
    document.getElementById("genResult").innerHTML=outfitCard(items,{cls:"gen",showButtons:true,anchorId:state.anchor});
  }
}

function toggleFavPanel(){
  const b=document.getElementById("fb");
  const open=b.classList.toggle("open");
  document.getElementById("fa").textContent=open?"▾":"▸";
  if(open)renderFavList();
}

function renderFavList(){
  const b=document.getElementById("fb");
  const valid=state.favorites.map((f,i)=>({...f,idx:i})).filter(f=>f.items.every(id=>!isDel(id)&&gi(id)));
  if(!valid.length){b.innerHTML='<div class="empty" style="padding:1rem 0">还没有收藏</div>';return;}
  const groups={};
  valid.forEach(f=>{
    const k=f.weather&&f.scene?`${f.weather}-${f.scene}`:"_legacy";
    (groups[k]=groups[k]||[]).push(f);
  });
  const orderedKeys=Object.keys(groups).sort();
  b.innerHTML=orderedKeys.map(k=>{
    const label=k==="_legacy"?"未分类":`${WEATHER_CN[k.split("-")[0]]||""} · ${SCENE_CN[k.split("-")[1]]||""}`;
    const cards=groups[k].map(f=>{
      const items=f.items.map(gi);
      return outfitCard(items,{cls:"fav",style:f.style,title:f.style,isFav:true,favIdx:f.idx,showButtons:true});
    }).join("");
    return`<div class="mc">${label}</div>${cards}`;
  }).join("");
}

function renderFavs(){
  const panel=document.getElementById("favPanel");
  const valid=state.favorites.filter(f=>f.items.every(id=>!isDel(id)&&gi(id)));
  if(!valid.length){panel.style.display="none";return;}
  panel.style.display="block";
  document.getElementById("favTitle").textContent=`全部收藏 (${valid.length})`;
  if(document.getElementById("fb").classList.contains("open"))renderFavList();
}

loadState();
renderMoods();
renderAnchor();
render();
renderFavs();
</script>
</body>
</html>
